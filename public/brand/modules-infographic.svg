<svg width="700" height="520" viewBox="0 0 700 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="centerGrad" cx="35%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </radialGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0A0A0A" flood-opacity="0.08"/>
    </filter>
    <style>
      .conn { stroke-dasharray: 220; stroke-dashoffset: 220; animation: draw 1.4s ease forwards; }
      .conn2 { animation-delay: 0.1s; }
      .conn3 { animation-delay: 0.2s; }
      .conn4 { animation-delay: 0.3s; }
      .conn5 { animation-delay: 0.4s; }
      .conn6 { animation-delay: 0.5s; }
      @keyframes draw { to { stroke-dashoffset: 0; } }
      .pulse { animation: pulse 3s ease-in-out infinite; transform-origin: 350px 260px; }
      @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }
      @media (prefers-reduced-motion: reduce) {
        .conn { stroke-dashoffset: 0; animation: none; }
        .pulse { animation: none; }
      }
    </style>
  </defs>

  <path class="conn conn1" d="M 120 110 Q 230 150 320 230" fill="none" stroke="#D4D4D1" stroke-width="2"/>
  <path class="conn conn2" d="M 580 110 Q 470 150 380 230" fill="none" stroke="#D4D4D1" stroke-width="2"/>
  <path class="conn conn3" d="M 80 260 Q 200 260 295 260" fill="none" stroke="#D4D4D1" stroke-width="2"/>
  <path class="conn conn4" d="M 620 260 Q 500 260 405 260" fill="none" stroke="#D4D4D1" stroke-width="2"/>
  <path class="conn conn5" d="M 120 410 Q 230 370 320 290" fill="none" stroke="#D4D4D1" stroke-width="2"/>
  <path class="conn conn6" d="M 580 410 Q 470 370 380 290" fill="none" stroke="#D4D4D1" stroke-width="2"/>

  <g filter="url(#cardShadow)">
    <rect x="40" y="60" width="160" height="68" rx="14" fill="#FFFFFF"/>
    <rect x="58" y="78" width="20" height="20" rx="5" fill="#2563EB" opacity="0.15"/>
    <rect x="63" y="83" width="10" height="10" rx="2" fill="#2563EB"/>
    <text x="92" y="93" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#0A0A0A">Inventory</text>
    <text x="58" y="112" font-family="-apple-system, sans-serif" font-size="10.5" fill="#71717A">Real-time stock</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="500" y="60" width="160" height="68" rx="14" fill="#FFFFFF"/>
    <circle cx="528" cy="88" r="10" fill="#2563EB" opacity="0.15"/>
    <circle cx="528" cy="88" r="5" fill="#2563EB"/>
    <text x="552" y="93" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#0A0A0A">Finance</text>
    <text x="518" y="112" font-family="-apple-system, sans-serif" font-size="10.5" fill="#71717A">Invoices and reports</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="0" y="226" width="160" height="68" rx="14" fill="#FFFFFF"/>
    <path d="M 28 252 L 38 244 L 48 252 L 48 270 L 28 270 Z" fill="#2563EB" opacity="0.15"/>
    <circle cx="38" cy="258" r="4" fill="#2563EB"/>
    <text x="62" y="259" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#0A0A0A">CRM</text>
    <text x="18" y="278" font-family="-apple-system, sans-serif" font-size="10.5" fill="#71717A">Leads and pipelines</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="540" y="226" width="160" height="68" rx="14" fill="#FFFFFF"/>
    <circle cx="566" cy="252" r="7" fill="#2563EB" opacity="0.15"/>
    <circle cx="578" cy="252" r="7" fill="#2563EB" opacity="0.3"/>
    <text x="596" y="259" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#0A0A0A">HR &amp; Payroll</text>
    <text x="558" y="278" font-family="-apple-system, sans-serif" font-size="10.5" fill="#71717A">People and pay</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="40" y="392" width="160" height="68" rx="14" fill="#FFFFFF"/>
    <path d="M 58 420 L 68 410 L 78 416 L 78 430 L 58 430 Z" fill="#2563EB" opacity="0.18"/>
    <text x="92" y="423" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#0A0A0A">Sales</text>
    <text x="58" y="442" font-family="-apple-system, sans-serif" font-size="10.5" fill="#71717A">Orders and quotas</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="500" y="392" width="160" height="68" rx="14" fill="#FFFFFF"/>
    <rect x="528" y="412" width="9" height="9" fill="#2563EB" opacity="0.2"/>
    <rect x="540" y="412" width="9" height="9" fill="#2563EB" opacity="0.4"/>
    <rect x="528" y="424" width="9" height="9" fill="#2563EB" opacity="0.6"/>
    <text x="558" y="423" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#0A0A0A">Projects</text>
    <text x="518" y="442" font-family="-apple-system, sans-serif" font-size="10.5" fill="#71717A">Plans and tasks</text>
  </g>

  <g class="pulse" filter="url(#cardShadow)">
    <circle cx="350" cy="260" r="62" fill="url(#centerGrad)"/>
    <text x="350" y="254" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="17" font-weight="700" fill="white">EMBORG</text>
    <text x="350" y="274" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="white" opacity="0.85">One platform</text>
  </g>
</svg>
